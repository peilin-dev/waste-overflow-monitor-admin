<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWOMS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="mobile-frame">
    <div class="status-bar">
        <span id="sb-time">09:41</span>
        <div style="display:flex;gap:5px">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full"></i>
        </div>
    </div>

    <div class="content-area" id="content">
        <!-- Tab 1: Clock -->
        <div class="page active" id="page-clock">
            <div class="header-section">
                <div style="display:flex;align-items:center;gap:14px;">
                    <div style="width:46px;height:46px;background:var(--pale-blue);border-radius:12px;
                                display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--primary-blue);">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <div id="user-name" style="font-size:18px;font-weight:700;color:var(--text-dark);">—</div>
                        <div id="user-zone" style="font-size:12px;color:var(--text-gray);">—</div>
                        <div id="today-date" style="font-size:11px;color:var(--text-gray);margin-top:2px;">—</div>
                    </div>
                    <div style="margin-left:auto;display:flex;gap:8px;">
                        <button onclick="showChangePwdModal()" style="background:none;border:none;
                            color:var(--text-gray);font-size:18px;cursor:pointer;" title="Change Password">
                            <i class="fa-solid fa-key"></i>
                        </button>
                        <button onclick="doLogout()" style="background:none;border:none;
                            color:var(--text-gray);font-size:20px;cursor:pointer;" title="Logout">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card" style="border:none;box-shadow:none;background:transparent;">
                <div style="display:flex;gap:10px;margin-bottom:32px;">
                    <div style="flex:1;background:#F8FAFC;padding:14px;border-radius:12px;border:1px solid #E2E8F0;">
                        <div style="font-size:13px;color:var(--text-gray);margin-bottom:4px;">Clock In</div>
                        <div id="ci-time" style="font-size:16px;font-weight:700;color:var(--text-dark);">—</div>
                        <div id="ci-status" style="font-size:11px;color:var(--text-gray);margin-top:4px;">Not yet</div>
                    </div>
                    <div style="flex:1;background:#F8FAFC;padding:14px;border-radius:12px;border:1px solid #E2E8F0;">
                        <div style="font-size:13px;color:var(--text-gray);margin-bottom:4px;">Clock Out</div>
                        <div id="co-time" style="font-size:16px;font-weight:700;color:var(--text-dark);">—</div>
                        <div id="co-status" style="font-size:11px;color:var(--text-gray);margin-top:4px;">Pending</div>
                    </div>
                </div>

                <div id="clock-btn-wrap" style="display:flex;justify-content:center;margin-bottom:24px;">
                    <button id="clock-btn" onclick="handleClock()"
                        style="width:150px;height:150px;border-radius:50%;
                               background:linear-gradient(135deg,#60A5FA,#2563EB);
                               color:white;border:none;display:flex;flex-direction:column;
                               justify-content:center;align-items:center;
                               box-shadow:0 10px 25px rgba(59,130,246,0.4);cursor:pointer;">
                        <div id="clock-btn-label" style="font-size:20px;font-weight:700;">Clock In</div>
                        <div id="clock-btn-time" style="font-size:13px;opacity:0.9;margin-top:4px;">—</div>
                    </button>
                </div>

                <div id="clock-msg" style="display:none;text-align:center;padding:10px;
                     border-radius:10px;font-size:13px;margin-bottom:8px;"></div>
                <div id="clock-done-msg" style="display:none;text-align:center;padding:12px;
                     background:#D1FAE5;border-radius:12px;font-size:13px;font-weight:600;color:#065F46;"></div>
            </div>
        </div>

        <!-- Tab 2: Tasks -->
        <div class="page" id="page-tasks">
            <div class="header-section">
                <h2 style="font-size:20px;font-weight:700;color:var(--text-dark);">Task Dispatch</h2>
                <p style="font-size:13px;color:var(--text-gray);">New alerts from sensor network</p>
            </div>
            <div id="tasks-list" style="padding:0 4px;"></div>
        </div>

        <!-- Tab 3: Report -->
        <div class="page" id="page-report">
            <div class="header-section">
                <h2 style="font-size:20px;font-weight:700;color:var(--text-dark);">Task Report</h2>
                <p style="font-size:13px;color:var(--text-gray);">Submit completion or issues</p>
            </div>
            <div id="report-content" style="padding:0 4px;"></div>
        </div>

        <!-- Tab 4: KPI -->
        <div class="page" id="page-kpi">
            <div class="header-section">
                <h2 style="font-size:20px;font-weight:700;color:var(--text-dark);">My Performance</h2>
                <p style="font-size:13px;color:var(--text-gray);">Weekly summary &amp; ratings</p>
            </div>
            <div id="kpi-content" style="padding:0 4px;"></div>
        </div>

        <!-- Tab 5: Admin Rate -->
        <div class="page" id="page-admin">
            <div class="header-section" style="background:var(--text-dark);">
                <h2 style="font-size:20px;font-weight:700;color:white;">Admin Scoring</h2>
                <p style="font-size:13px;color:#94A3B8;">Review completed tasks</p>
            </div>
            <div id="admin-list" style="padding:0 4px;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="nav-clock" onclick="switchTab('clock')">
            <i class="fa-regular fa-clock"></i><span>Time</span>
        </button>
        <button class="nav-btn" id="nav-tasks" onclick="switchTab('tasks')">
            <i class="fa-solid fa-list-check"></i><span>Tasks</span>
        </button>
        <button class="nav-btn" id="nav-report" onclick="switchTab('report')">
            <i class="fa-solid fa-camera"></i><span>Report</span>
        </button>
        <button class="nav-btn" id="nav-kpi" onclick="switchTab('kpi')">
            <i class="fa-solid fa-chart-simple"></i><span>My KPI</span>
        </button>
        <button class="nav-btn" id="nav-admin" onclick="switchTab('admin')">
            <i class="fa-solid fa-user-shield"></i><span>Admin</span>
        </button>
    </div>
</div>

<script type="module">
import { requireAuth, getUser, logout } from './js/auth.js';
import { getMe, getToday, clockIn, clockOut,
         getTasks, acceptTask, reportTask, rateTask,
         getPerformance, uploadFile, getBlocks, changePassword } from './js/api.js';

requireAuth();

// ─── Globals ────────────────────────────────────────────────────────────────
let ME = getUser();
let blockMap = {};
let uploadedPhotos = [];
let selectedRatings = {};
let tasksRefreshTimer = null;

// ─── Nav ────────────────────────────────────────────────────────────────────
window.switchTab = async (tab) => {
    clearInterval(tasksRefreshTimer);
    tasksRefreshTimer = null;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
    if (tab === 'clock')  await loadClock();
    if (tab === 'tasks')  { await loadTasks(); tasksRefreshTimer = setInterval(loadTasks, 30000); }
    if (tab === 'report') await loadReport();
    if (tab === 'kpi')    await loadKpi();
    if (tab === 'admin')  await loadAdmin();
};

window.doLogout = () => logout();

// ─── Clock ───────────────────────────────────────────────────────────────────
async function loadClock() {
    if (ME) {
        document.getElementById('user-name').textContent = ME.name;
        document.getElementById('user-zone').textContent =
            (ME.zone || 'No zone') + ' · SWOMS';
    }
    document.getElementById('today-date').textContent =
        new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const rec = await getToday().catch(() => null);
    updateClockUI(rec);
}

function updateClockUI(rec) {
    const fmt = dt => dt ? new Date(dt).toLocaleTimeString('en-US',
        { hour: '2-digit', minute: '2-digit', hour12: false }) : '—';
    document.getElementById('ci-time').textContent = fmt(rec?.clock_in);
    document.getElementById('co-time').textContent = fmt(rec?.clock_out);
    document.getElementById('ci-status').textContent =
        rec?.clock_in ? '✓ Done' : 'Not yet';
    document.getElementById('co-status').textContent =
        rec?.clock_out ? '✓ Done' : 'Pending';
    const btnLabel = document.getElementById('clock-btn-label');
    const btnTime  = document.getElementById('clock-btn-time');
    btnTime.textContent = new Date().toLocaleTimeString('en-US',
        { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    const clockBtn = document.getElementById('clock-btn');
    if (!rec) {
        btnLabel.textContent = 'Clock In';
        clockBtn.style.background = 'linear-gradient(135deg,#60A5FA,#2563EB)';
        clockBtn.disabled = false;
    } else if (!rec.clock_out) {
        btnLabel.textContent = 'Clock Out';
        clockBtn.style.background = 'linear-gradient(135deg,#34D399,#059669)';
        clockBtn.disabled = false;
    } else {
        btnLabel.textContent = 'Done ✓';
        clockBtn.style.background = '#94A3B8';
        clockBtn.disabled = true;
        const doneEl = document.getElementById('clock-done-msg');
        if (doneEl) {
            const hrs = rec.clock_out && rec.clock_in
                ? ((new Date(rec.clock_out) - new Date(rec.clock_in)) / 3600000).toFixed(1)
                : null;
            doneEl.innerHTML = `🎉 Today's work complete!${hrs ? ` &nbsp;·&nbsp; ${hrs}h on duty` : ''}`;
            doneEl.style.display = 'block';
        }
    }
}

window.handleClock = async () => {
    const btn = document.getElementById('clock-btn');
    const msg = document.getElementById('clock-msg');
    msg.style.display = 'none';

    const rec = await getToday().catch(() => null);

    if (!rec) {
        // Clock In — no confirmation needed
        btn.disabled = true;
        try {
            const updated = await clockIn();
            showClockMsg('Clocked in successfully!', 'success');
            if (updated) updateClockUI(updated);
        } catch (e) {
            showClockMsg(e.message || 'Error', 'error');
            btn.disabled = false;
        }
    } else if (!rec.clock_out) {
        // Clock Out — show confirmation first
        showClockConfirm(rec);
    }
};

function showClockConfirm(rec) {
    const old = document.getElementById('clock-confirm');
    if (old) old.remove();

    const fmt = dt => new Date(dt).toLocaleTimeString('en-US',
        { hour: '2-digit', minute: '2-digit', hour12: false });

    const el = document.createElement('div');
    el.id = 'clock-confirm';
    Object.assign(el.style, {
        position: 'absolute', inset: '0', background: 'rgba(0,0,0,0.5)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        zIndex: '500', borderRadius: '32px',
    });
    el.innerHTML = `
        <div style="background:#fff;border-radius:20px;padding:28px 24px;margin:0 24px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);">
            <div style="font-size:36px;margin-bottom:12px;">🕐</div>
            <div style="font-size:16px;font-weight:700;color:#1E293B;margin-bottom:8px;">Clock Out?</div>
            <div style="font-size:13px;color:#64748B;margin-bottom:20px;">
                You clocked in at <b>${fmt(rec.clock_in)}</b>.<br>Confirm clock out?
            </div>
            <div style="display:flex;gap:10px;">
                <button onclick="document.getElementById('clock-confirm').remove()"
                    style="flex:1;padding:12px;border-radius:10px;border:1px solid #CBD5E1;
                           background:#F8FAFC;color:#64748B;font-size:14px;font-weight:600;cursor:pointer;">
                    Cancel
                </button>
                <button onclick="confirmClockOut()"
                    style="flex:1;padding:12px;border-radius:10px;border:none;
                           background:linear-gradient(135deg,#34D399,#059669);
                           color:white;font-size:14px;font-weight:600;cursor:pointer;">
                    Confirm
                </button>
            </div>
        </div>`;
    document.querySelector('.mobile-frame').appendChild(el);
}

window.confirmClockOut = async () => {
    document.getElementById('clock-confirm')?.remove();
    const btn = document.getElementById('clock-btn');
    btn.disabled = true;
    try {
        const updated = await clockOut();
        showClockMsg('Clocked out successfully!', 'success');
        if (updated) updateClockUI(updated);
    } catch (e) {
        showClockMsg(e.message || 'Error', 'error');
        btn.disabled = false;
    }
};

function showClockMsg(text, type) {
    const el = document.getElementById('clock-msg');
    el.textContent = text;
    el.style.background = type === 'success' ? '#D1FAE5' : '#FEE2E2';
    el.style.color = type === 'success' ? '#065F46' : '#DC2626';
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ─── Tasks ───────────────────────────────────────────────────────────────────
async function loadTasks() {
    const el = document.getElementById('tasks-list');
    el.innerHTML = '<p style="padding:20px;color:#94A3B8;text-align:center">Loading…</p>';
    try {
        const [active, pending] = await Promise.all([
            ME ? getTasks({ status: 'in_progress', cleaner_id: ME.id }) : Promise.resolve([]),
            getTasks({ status: 'pending' }),
        ]);

        let html = '';

        // My active tasks section
        if (active.length) {
            html += `<div style="padding:12px 16px 4px;font-size:12px;font-weight:700;
                color:var(--success-green);letter-spacing:.05em;">
                <i class="fa-solid fa-circle-check"></i> MY ACTIVE TASKS (${active.length})
            </div>`;
            html += active.map(t => {
                const bin = t.bin || {};
                const blockName = blockMap[bin.block_id] || `Block #${bin.block_id}`;
                const acceptedAt = t.accepted_at
                    ? new Date(t.accepted_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })
                    : '—';
                return `
                <div class="card" style="border-left:3px solid var(--success-green);">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
                                    justify-content:center;font-size:18px;background:#D1FAE5;color:var(--success-green);">
                            <i class="fa-solid fa-person-walking"></i>
                        </div>
                        <div style="flex:1;">
                            <div style="font-weight:700;font-size:14px;color:var(--text-dark);">
                                ${blockName} · Floor ${bin.floor ?? '?'} · Bin ${bin.bin_number ?? '?'}
                            </div>
                            <div style="font-size:12px;color:var(--text-gray);">Accepted at ${acceptedAt}</div>
                        </div>
                        <span class="badge" style="background:#D1FAE5;color:var(--success-green);">In Progress</span>
                    </div>
                    <button class="btn-primary btn-success" onclick="switchTab('report')" style="margin-top:4px;">
                        <i class="fa-solid fa-camera"></i> Go to Report
                    </button>
                </div>`;
            }).join('');
        }

        // Available tasks section
        html += `<div style="padding:12px 16px 4px;font-size:12px;font-weight:700;
            color:var(--text-gray);letter-spacing:.05em;">
            <i class="fa-solid fa-list-check"></i> AVAILABLE TASKS
        </div>`;

        if (!pending.length) {
            html += '<p style="padding:20px;color:#94A3B8;text-align:center;font-size:14px;">No pending tasks 🎉</p>';
        } else {
            html += pending.map(t => {
                const bin = t.bin || {};
                const fill = bin.current_fill ?? 0;
                const blockName = blockMap[bin.block_id] || `Block #${bin.block_id}`;
                const isUrgent = fill >= 90;
                const color = fill >= 90 ? 'var(--danger-red)' : fill >= 60 ? 'var(--warning-orange)' : 'var(--success-green)';
                return `
                <div class="card">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
                        <div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
                                    justify-content:center;font-size:18px;
                                    background:${isUrgent ? '#FEE2E2' : '#FEF3C7'};color:${color};">
                            <i class="fa-solid fa-trash-can"></i>
                        </div>
                        <div style="flex:1;">
                            <div style="font-weight:700;font-size:14px;color:var(--text-dark);">
                                ${blockName} · Floor ${bin.floor ?? '?'} · Bin ${bin.bin_number ?? '?'}
                            </div>
                            <div style="font-size:12px;color:var(--text-gray);">Sensor: ${bin.sensor_id || '—'}</div>
                        </div>
                        ${isUrgent ? '<span class="badge" style="background:#FEE2E2;color:var(--danger-red);">URGENT</span>' : ''}
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width:${fill}%;background:${color};"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:12px;
                                font-weight:600;color:var(--text-dark);margin-bottom:12px;">
                        <span>Fill Level</span><span>${fill}%</span>
                    </div>
                    <button class="btn-primary" onclick="doAccept(${t.id}, this)">
                        <i class="fa-solid fa-hand-pointer"></i> Accept Task
                    </button>
                </div>`;
            }).join('');
        }

        el.innerHTML = html;
    } catch (e) {
        el.innerHTML = `<p style="padding:20px;color:var(--danger-red);text-align:center">${e.message}
            <br><button onclick="loadTasks()" style="margin-top:8px;padding:8px 16px;border-radius:8px;
            border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:13px;">Retry</button></p>`;
    }
}

window.doAccept = async (taskId, btn) => {
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Accepting…';
    try {
        await acceptTask(taskId);
        btn.closest('.card').style.transition = 'opacity .3s';
        btn.closest('.card').style.opacity = '0';
        setTimeout(() => {
            btn.closest('.card')?.remove();
            const el = document.getElementById('tasks-list');
            if (el && !el.querySelector('.card')) {
                el.innerHTML = '<p style="padding:30px;color:#94A3B8;text-align:center;font-size:14px;">No pending tasks 🎉</p>';
            }
        }, 300);
        showBeforePhotoPrompt(taskId);
    } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-hand-pointer"></i> Accept Task';
        showToast(e.message || 'Failed to accept task', 'error');
    }
};

function showBeforePhotoPrompt(taskId) {
    const old = document.getElementById('before-photo-modal');
    if (old) old.remove();
    const modal = document.createElement('div');
    modal.id = 'before-photo-modal';
    Object.assign(modal.style, {
        position: 'absolute', inset: '0', background: 'rgba(0,0,0,0.6)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        zIndex: '600', borderRadius: '32px',
    });
    modal.innerHTML = `
        <div style="background:#fff;border-radius:20px;padding:24px;margin:0 20px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.25);">
            <div style="font-size:34px;margin-bottom:10px;">📸</div>
            <div style="font-size:16px;font-weight:700;color:#1E293B;margin-bottom:6px;">Take a Before Photo</div>
            <div style="font-size:13px;color:#64748B;margin-bottom:18px;">Photograph the bin <b>before</b> cleaning so the admin can compare.</div>
            <div id="before-preview" style="margin-bottom:14px;"></div>
            <input type="file" id="before-input" accept="image/*" capture="environment" style="display:none">
            <button onclick="document.getElementById('before-input').click()"
                style="width:100%;padding:12px;border-radius:10px;border:2px dashed #3B82F6;
                       background:#EFF6FF;color:#3B82F6;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;">
                <i class="fa-solid fa-camera"></i> Open Camera
            </button>
            <div style="display:flex;gap:10px;">
                <button onclick="skipBeforePhoto(${taskId})"
                    style="flex:1;padding:11px;border-radius:10px;border:1px solid #CBD5E1;
                           background:#F8FAFC;color:#64748B;font-size:13px;font-weight:600;cursor:pointer;">
                    Skip
                </button>
                <button id="before-confirm-btn" onclick="confirmBeforePhoto(${taskId})" disabled
                    style="flex:1;padding:11px;border-radius:10px;border:none;
                           background:#3B82F6;color:white;font-size:13px;font-weight:600;
                           cursor:pointer;opacity:0.4;">
                    Confirm
                </button>
            </div>
        </div>`;
    document.querySelector('.mobile-frame').appendChild(modal);

    document.getElementById('before-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const confirmBtn = document.getElementById('before-confirm-btn');
        confirmBtn.textContent = 'Uploading…';
        confirmBtn.disabled = true;
        try {
            const { url } = await uploadFile(file);
            localStorage.setItem(`wm_before_${taskId}`, url);
            const preview = document.getElementById('before-preview');
            preview.innerHTML = `
                <div style="position:relative;display:inline-block;">
                    <img src="${url}" style="width:100%;max-height:140px;object-fit:cover;border-radius:10px;border:2px solid #3B82F6;">
                    <span style="position:absolute;top:6px;left:6px;background:#3B82F6;color:white;
                        font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;">BEFORE</span>
                </div>`;
            confirmBtn.textContent = 'Confirm';
            confirmBtn.disabled = false;
            confirmBtn.style.opacity = '1';
        } catch (err) {
            showToast('Upload failed: ' + err.message, 'error');
            confirmBtn.textContent = 'Confirm';
        }
    });
}

window.skipBeforePhoto = (taskId) => {
    document.getElementById('before-photo-modal')?.remove();
    showToast('Task accepted! Take a Before photo when you arrive.', 'success');
};

window.confirmBeforePhoto = (taskId) => {
    document.getElementById('before-photo-modal')?.remove();
    showToast('Before photo saved! Head to Report tab when done.', 'success');
};

function showToast(msg, type) {
    const old = document.getElementById('wm-toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.id = 'wm-toast';
    t.textContent = msg;
    Object.assign(t.style, {
        position: 'absolute', bottom: '96px', left: '16px', right: '16px',
        padding: '12px 16px', borderRadius: '12px', fontSize: '13px',
        fontWeight: '600', zIndex: '999', textAlign: 'center',
        background: type === 'success' ? '#D1FAE5' : '#FEE2E2',
        color: type === 'success' ? '#065F46' : '#DC2626',
        boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
        transition: 'opacity .3s',
    });
    document.querySelector('.mobile-frame').appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; }, 2500);
    setTimeout(() => t.remove(), 2800);
}

// ─── Report ───────────────────────────────────────────────────────────────────
async function loadReport() {
    uploadedPhotos = [];
    const el = document.getElementById('report-content');
    el.innerHTML = '<p style="padding:20px;color:#94A3B8;text-align:center">Loading…</p>';
    try {
        const tasks = ME ? await getTasks({ status: 'in_progress', cleaner_id: ME.id }) : [];
        if (!tasks.length) {
            el.innerHTML = '<div class="card" style="text-align:center;padding:24px;color:var(--text-gray);font-size:14px;">No active tasks.<br>Accept a task first.</div>';
            return;
        }
        const firstTask = tasks[0];
        const beforeUrl = localStorage.getItem(`wm_before_${firstTask.id}`);
        if (beforeUrl) uploadedPhotos.push(beforeUrl);

        const options = tasks.map(t => {
            const bin = t.bin || {};
            const blockName = blockMap[bin.block_id] || `Block #${bin.block_id}`;
            return `<option value="${t.id}">${blockName} · Floor ${bin.floor} · Bin ${bin.bin_number}</option>`;
        }).join('');

        const beforePreviewHtml = `
            <div id="before-photo-wrap" style="margin-bottom:10px;${beforeUrl ? '' : 'display:none'}">
                <div style="font-size:11px;font-weight:700;color:#64748B;margin-bottom:4px;">BEFORE (saved)</div>
                <div style="position:relative;display:inline-block;">
                    <img src="${beforeUrl || ''}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:2px solid #3B82F6;">
                    <span style="position:absolute;top:2px;left:2px;background:#3B82F6;color:white;
                        font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;">B</span>
                </div>
            </div>`;

        el.innerHTML = `
        <div class="card">
            <div class="form-group">
                <label>Select Active Task</label>
                <select id="report-task-sel" onchange="onReportTaskChange(this.value)">${options}</select>
            </div>
            <div class="form-group">
                <label>Result</label>
                <select id="report-result">
                    <option value="cleaned">Successfully Emptied</option>
                    <option value="damaged">Bin Damaged / Needs Repair</option>
                    <option value="false_alarm">False Alarm</option>
                    <option value="unable">Unable to Complete</option>
                </select>
            </div>
            <div class="form-group">
                <label>After Photos</label>
                ${beforePreviewHtml}
                <div class="upload-area" onclick="document.getElementById('photo-input').click()">
                    <i class="fa-solid fa-camera" style="font-size:22px;color:var(--primary-blue);"></i>
                    <span style="font-size:13px;">Tap to take After photo</span>
                </div>
                <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" multiple>
                <div id="photo-preview" class="photo-row"></div>
            </div>
            <div id="report-msg" style="display:none;padding:10px;border-radius:10px;
                 font-size:13px;margin-bottom:8px;"></div>
            <button class="btn-primary btn-success" id="report-submit-btn" onclick="doReport()">
                <i class="fa-solid fa-paper-plane"></i> Submit Report
            </button>
        </div>`;

        window.onReportTaskChange = (taskId) => {
            const url = localStorage.getItem(`wm_before_${taskId}`);
            uploadedPhotos = url ? [url] : [];
            document.getElementById('photo-preview').innerHTML = '';
            const beforeWrap = document.getElementById('before-photo-wrap');
            if (beforeWrap) {
                beforeWrap.style.display = url ? 'block' : 'none';
                const img = beforeWrap.querySelector('img');
                if (img && url) img.src = url;
            }
        };

        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const preview = document.getElementById('photo-preview');
            for (const file of e.target.files) {
                try {
                    const { url } = await uploadFile(file);
                    uploadedPhotos.push(url);
                    const img = document.createElement('img');
                    img.src = url; img.className = 'photo-thumb';
                    preview.appendChild(img);
                } catch (err) { showToast('Upload failed: ' + err.message, 'error'); }
            }
        });
    } catch (e) {
        el.innerHTML = `<p style="padding:20px;color:var(--danger-red);text-align:center">${e.message}
            <br><button onclick="loadReport()" style="margin-top:8px;padding:8px 16px;border-radius:8px;
            border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:13px;">Retry</button></p>`;
    }
}

window.doReport = async () => {
    const btn = document.getElementById('report-submit-btn');
    const msg = document.getElementById('report-msg');
    const taskId = parseInt(document.getElementById('report-task-sel').value);
    const result = document.getElementById('report-result').value;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
    msg.style.display = 'none';
    try {
        await reportTask(taskId, result, uploadedPhotos);
        localStorage.removeItem(`wm_before_${taskId}`);
        msg.textContent = 'Report submitted!';
        msg.style.background = '#D1FAE5'; msg.style.color = '#065F46';
        msg.style.display = 'block';
        setTimeout(() => loadReport(), 1500);
    } catch (e) {
        msg.textContent = e.message || 'Submit failed';
        msg.style.background = '#FEE2E2'; msg.style.color = '#DC2626';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Report';
    }
};

// ─── KPI ─────────────────────────────────────────────────────────────────────
async function loadKpi() {
    const el = document.getElementById('kpi-content');
    el.innerHTML = '<p style="padding:20px;color:#94A3B8;text-align:center">Loading…</p>';
    if (!ME) { el.innerHTML = '<p style="padding:20px;color:var(--danger-red);text-align:center">Not logged in</p>'; return; }
    try {
        const [p, history] = await Promise.all([
            getPerformance(ME.id),
            getTasks({ status: 'rated', cleaner_id: ME.id }),
        ]);
        const rating = p.average_rating ? p.average_rating.toFixed(1) : '—';
        const stars = p.average_rating
            ? Array.from({ length: 5 }, (_, i) =>
                `<i class="fa-${i < Math.round(p.average_rating) ? 'solid' : 'regular'} fa-star"
                    style="color:${i < Math.round(p.average_rating) ? 'var(--warning-orange)' : '#CBD5E1'}"></i>`
              ).join('')
            : '—';

        const historyHtml = history.slice(0, 5).map(t => {
            const bin = t.bin || {};
            const blockName = blockMap[bin.block_id] || `Block #${bin.block_id}`;
            const ratingStars = t.rating
                ? Array.from({ length: 5 }, (_, i) =>
                    `<i class="fa-${i < t.rating ? 'solid' : 'regular'} fa-star"
                        style="font-size:11px;color:${i < t.rating ? 'var(--warning-orange)' : '#CBD5E1'}"></i>`
                  ).join('')
                : '<span style="color:#CBD5E1;font-size:11px;">Not rated</span>';
            const completedAt = t.completed_at
                ? new Date(t.completed_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                : '—';
            return `
            <div style="display:flex;align-items:center;justify-content:space-between;
                        padding:10px 0;border-bottom:1px solid #F1F5F9;">
                <div>
                    <div style="font-size:13px;font-weight:600;color:var(--text-dark);">
                        ${blockName} · F${bin.floor ?? '?'} · B${bin.bin_number ?? '?'}
                    </div>
                    <div style="font-size:11px;color:var(--text-gray);margin-top:2px;">${completedAt}</div>
                </div>
                <div style="text-align:right;">
                    <div>${ratingStars}</div>
                    ${t.comment ? `<div style="font-size:11px;color:var(--text-gray);max-width:100px;
                        text-overflow:ellipsis;overflow:hidden;white-space:nowrap;">"${t.comment}"</div>` : ''}
                </div>
            </div>`;
        }).join('');

        el.innerHTML = `
        <div class="card" style="text-align:center;">
            <div class="score-circle">
                <div style="font-size:36px;font-weight:700;color:var(--primary-blue);line-height:1;">${rating}</div>
                <div style="font-size:13px;margin-top:4px;">${stars}</div>
            </div>
            <h3 style="font-size:16px;font-weight:700;color:var(--text-dark);">
                ${!p.average_rating ? 'No ratings yet' : p.average_rating >= 4.5 ? 'Excellent Work!' : p.average_rating >= 3.5 ? 'Good Work!' : 'Keep it up!'}
            </h3>
            <div class="stats-grid">
                <div class="stat-box">
                    <div style="font-size:24px;font-weight:700;color:var(--text-dark);">${p.completed_tasks}</div>
                    <div style="font-size:12px;color:var(--text-gray);margin-top:4px;">Bins Emptied</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:24px;font-weight:700;color:var(--success-green);">
                        ${p.on_time_rate != null ? p.on_time_rate + '%' : '—'}
                    </div>
                    <div style="font-size:12px;color:var(--text-gray);margin-top:4px;">On-Time SLA</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:24px;font-weight:700;color:var(--primary-blue);">${p.total_tasks}</div>
                    <div style="font-size:12px;color:var(--text-gray);margin-top:4px;">Total Tasks</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:24px;font-weight:700;color:var(--warning-orange);">${p.pending_tasks}</div>
                    <div style="font-size:12px;color:var(--text-gray);margin-top:4px;">In Progress</div>
                </div>
            </div>
        </div>
        ${historyHtml ? `
        <div class="card">
            <div style="font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:4px;">
                <i class="fa-solid fa-clock-rotate-left"></i> Recent Rated Tasks
            </div>
            ${historyHtml}
        </div>` : ''}`;
    } catch (e) {
        el.innerHTML = `<p style="padding:20px;color:var(--danger-red);text-align:center">${e.message}
            <br><button onclick="loadKpi()" style="margin-top:8px;padding:8px 16px;border-radius:8px;
            border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:13px;">Retry</button></p>`;
    }
}

// ─── Admin Rate ───────────────────────────────────────────────────────────────
async function loadAdmin() {
    selectedRatings = {};
    const el = document.getElementById('admin-list');
    el.innerHTML = '<p style="padding:20px;color:#94A3B8;text-align:center">Loading…</p>';
    try {
        const [completed, rated] = await Promise.all([
            getTasks({ status: 'completed' }),
            getTasks({ status: 'rated' }),
        ]);
        const tasks = [...completed, ...rated.slice(0, 10)];
        if (!tasks.length) {
            el.innerHTML = '<div class="card" style="text-align:center;padding:24px;color:var(--text-gray);font-size:14px;">No completed tasks to rate.</div>';
            return;
        }
        el.innerHTML = tasks.map(t => {
        const isRated = t.status === 'rated';
            const bin = t.bin || {};
            const cl  = t.cleaner || {};
            const blockName = blockMap[bin.block_id] || `Block #${bin.block_id}`;
            const completedAt = t.completed_at
                ? new Date(t.completed_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                : '—';
            const photos = (t.photos || []).map((url, i) => {
                const label = i === 0 ? 'BEFORE' : 'AFTER';
                const color = i === 0 ? '#3B82F6' : '#10B981';
                return `<div style="position:relative;display:inline-block;">
                    <img src="${url}" class="photo-thumb" onerror="this.style.display='none'">
                    <span style="position:absolute;top:2px;left:2px;background:${color};color:white;
                        font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;">${label}</span>
                </div>`;
            }).join('');
            const stars = Array.from({ length: 5 }, (_, i) =>
                `<i class="fa-regular fa-star star" data-task="${t.id}" data-val="${i + 1}"
                    onclick="setStar(${t.id}, ${i + 1})"></i>`
            ).join('');
            return `
            <div class="card" id="rate-card-${t.id}">
                <div style="display:flex;justify-content:space-between;font-size:13px;
                            font-weight:700;color:var(--text-dark);margin-bottom:8px;">
                    <span><i class="fa-solid fa-user"></i> ${cl.name || '—'}</span>
                    <span style="color:var(--text-gray);font-weight:400;font-size:12px;">${completedAt}</span>
                </div>
                <div style="font-size:13px;font-weight:600;color:var(--text-dark);margin-bottom:8px;">
                    ${blockName} · Floor ${bin.floor ?? '?'} · Bin ${bin.bin_number ?? '?'}
                </div>
                ${photos ? `<div class="photo-row">${photos}</div>` : ''}
                ${isRated ? `
                <div style="display:flex;align-items:center;justify-content:space-between;
                            background:#F0FDF4;border-radius:10px;padding:10px;margin-top:6px;">
                    <div>
                        ${Array.from({length:5},(_,i)=>`<i class="fa-${i<t.rating?'solid':'regular'} fa-star"
                            style="color:${i<t.rating?'var(--warning-orange)':'#CBD5E1'};font-size:14px;"></i>`).join('')}
                    </div>
                    <span style="font-size:11px;color:var(--success-green);font-weight:700;">✓ Rated</span>
                </div>
                ${t.comment ? `<div style="font-size:12px;color:var(--text-gray);margin-top:6px;font-style:italic;">"${t.comment}"</div>` : ''}
                <button class="btn-primary" style="margin-top:8px;background:#64748B;" onclick="reRate(${t.id})">
                    <i class="fa-solid fa-pen"></i> Re-rate
                </button>` : `
                <div id="stars-${t.id}" style="display:flex;gap:4px;margin:10px 0;">${stars}</div>
                <input type="text" id="comment-${t.id}" placeholder="Add a comment…"
                       style="width:100%;border:1px solid #CBD5E1;border-radius:10px;
                              padding:10px;font-size:13px;margin-bottom:10px;">
                <button class="btn-primary" onclick="doRate(${t.id}, this)">
                    <i class="fa-solid fa-star"></i> Submit Rating
                </button>`}
            </div>`;
        }).join('');
    } catch (e) {
        el.innerHTML = `<p style="padding:20px;color:var(--danger-red);text-align:center">${e.message}
            <br><button onclick="loadAdmin()" style="margin-top:8px;padding:8px 16px;border-radius:8px;
            border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:13px;">Retry</button></p>`;
    }
}

window.reRate = (taskId) => {
    const card = document.getElementById('rate-card-' + taskId);
    const ratedDiv = card.querySelector('[style*="F0FDF4"]');
    if (ratedDiv) {
        const stars = Array.from({length:5},(_,i)=>
            `<i class="fa-regular fa-star star" data-task="${taskId}" data-val="${i+1}"
                onclick="setStar(${taskId},${i+1})"></i>`).join('');
        ratedDiv.outerHTML = `
            <div id="stars-${taskId}" style="display:flex;gap:4px;margin:10px 0;">${stars}</div>
            <input type="text" id="comment-${taskId}" placeholder="Update comment…"
                   style="width:100%;border:1px solid #CBD5E1;border-radius:10px;
                          padding:10px;font-size:13px;margin-bottom:10px;">
            <button class="btn-primary" onclick="doRate(${taskId},this)">
                <i class="fa-solid fa-star"></i> Update Rating
            </button>`;
        card.querySelector('[onclick*="reRate"]')?.remove();
    }
};

window.setStar = (taskId, val) => {
    selectedRatings[taskId] = val;
    document.querySelectorAll(`[data-task="${taskId}"]`).forEach(s => {
        const isActive = parseInt(s.dataset.val) <= val;
        s.className = `fa-${isActive ? 'solid' : 'regular'} fa-star star${isActive ? ' active' : ''}`;
    });
};

window.doRate = async (taskId, btn) => {
    const rating = selectedRatings[taskId];
    if (!rating) { alert('Please select a star rating first'); return; }
    const comment = document.getElementById('comment-' + taskId).value.trim();
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
    try {
        await rateTask(taskId, rating, comment || undefined);
        const card = document.getElementById('rate-card-' + taskId);
        card.style.border = '1px solid var(--success-green)';
        card.style.background = '#F0FDF4';
        btn.outerHTML = `<div style="text-align:center;color:var(--success-green);
            font-weight:700;padding:10px;">
            <i class="fa-solid fa-check-circle"></i> Rated ${rating} Star${rating > 1 ? 's' : ''}
        </div>`;
    } catch (e) {
        alert(e.message || 'Rating failed');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-star"></i> Submit Rating';
    }
};

// ─── Change Password ─────────────────────────────────────────────────────────
window.showChangePwdModal = () => {
    const old = document.getElementById('chpwd-modal');
    if (old) old.remove();
    const el = document.createElement('div');
    el.id = 'chpwd-modal';
    Object.assign(el.style, {
        position: 'absolute', inset: '0', background: 'rgba(0,0,0,0.5)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        zIndex: '500', borderRadius: '32px',
    });
    el.innerHTML = `
        <div style="background:#fff;border-radius:20px;padding:28px 24px;margin:0 24px;
                    box-shadow:0 20px 40px rgba(0,0,0,0.2);width:100%;">
            <div style="font-size:16px;font-weight:700;color:#1E293B;margin-bottom:18px;">
                <i class="fa-solid fa-key" style="color:var(--primary-blue);margin-right:8px;"></i>Change Password
            </div>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="chpwd-cur" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="chpwd-new" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="chpwd-cfm" placeholder="Repeat new password">
            </div>
            <div id="chpwd-err" style="display:none;background:#FEE2E2;color:#DC2626;
                 padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;"></div>
            <div style="display:flex;gap:10px;">
                <button onclick="document.getElementById('chpwd-modal').remove()"
                    style="flex:1;padding:12px;border-radius:10px;border:1px solid #CBD5E1;
                           background:#F8FAFC;color:#64748B;font-size:14px;font-weight:600;cursor:pointer;">
                    Cancel
                </button>
                <button id="chpwd-submit" onclick="doChangePwd()"
                    style="flex:1;padding:12px;border-radius:10px;border:none;
                           background:var(--primary-blue);color:white;
                           font-size:14px;font-weight:600;cursor:pointer;">
                    Save
                </button>
            </div>
        </div>`;
    document.querySelector('.mobile-frame').appendChild(el);
};

window.doChangePwd = async () => {
    const cur = document.getElementById('chpwd-cur').value;
    const nw  = document.getElementById('chpwd-new').value;
    const cfm = document.getElementById('chpwd-cfm').value;
    const err = document.getElementById('chpwd-err');
    const btn = document.getElementById('chpwd-submit');
    err.style.display = 'none';
    if (!cur || !nw || !cfm) { err.textContent = 'Please fill in all fields'; err.style.display = 'block'; return; }
    if (nw.length < 6) { err.textContent = 'New password must be at least 6 characters'; err.style.display = 'block'; return; }
    if (nw !== cfm) { err.textContent = 'New passwords do not match'; err.style.display = 'block'; return; }
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
        await changePassword(cur, nw);
        document.getElementById('chpwd-modal').remove();
        showToast('Password changed successfully!', 'success');
    } catch (e) {
        err.textContent = e.message || 'Failed to change password';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save';
    }
};

// ─── Init ────────────────────────────────────────────────────────────────────
setInterval(() => {
    document.getElementById('sb-time').textContent =
        new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const tEl = document.getElementById('clock-btn-time');
    if (tEl) tEl.textContent = new Date().toLocaleTimeString('en-US',
        { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}, 1000);

(async () => {
    if (!ME) { ME = await getMe().catch(() => null); }
    const blocks = await getBlocks().catch(() => []);
    blocks.forEach(b => { blockMap[b.id] = b.name; });

    // Show Admin tab only for admins; hide KPI tab for admins (not relevant)
    if (ME?.role !== 'admin') {
        document.getElementById('nav-admin').style.display = 'none';
    } else {
        document.getElementById('nav-kpi').style.display = 'none';
    }

    await loadClock();
})();
</script>
